services:
  squid:
    image: docker.io/ubuntu/squid:latest@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029
    container_name: hermes-squid
    restart: unless-stopped
    volumes:
      - ./data/squid/squid.conf:/etc/squid/squid.conf:ro
      - ./data/squid/conf.d:/etc/squid/conf.d:ro
      - ./data/squid/logs:/var/log/squid:rw
    security_opt:
      - no-new-privileges
    networks:
      - hermes-internal
      - internet

  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes-codex
    image: hermes-agent-codex:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    shm_size: 1g
    volumes:
      - ./data/hermes:/opt/data:rw
      - ./data/codex:/opt/data/home/.codex:rw
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_HOST: "127.0.0.1"
      HERMES_DASHBOARD_PORT: "9118"
      CODEX_HOME: "/opt/data/home/.codex"
      HTTP_PROXY: "http://squid:3128"
      HTTPS_PROXY: "http://squid:3128"
      ALL_PROXY: "http://squid:3128"
      NO_PROXY: "127.0.0.1,localhost"
      http_proxy: "http://squid:3128"
      https_proxy: "http://squid:3128"
      all_proxy: "http://squid:3128"
      no_proxy: "127.0.0.1,localhost"
    networks:
      - hermes-internal
    depends_on:
      - squid

  hermes-dashboard-proxy:
    image: caddy:2-alpine@sha256:77c07d5ebfa5be9fd6c820d2094ae662c9e7eeb9bf98346b7f639900263ee2a2
    container_name: hermes-dashboard-proxy
    restart: unless-stopped
    network_mode: "service:hermes"
    read_only: true
    tmpfs:
      - /data
      - /config
    security_opt:
      - no-new-privileges
    command:
      - caddy
      - reverse-proxy
      - --from
      - :9119
      - --to
      - 127.0.0.1:9118
    depends_on:
      - hermes

  codex-login-proxy:
    image: alpine/socat:latest@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    container_name: hermes-codex-login-proxy
    restart: unless-stopped
    network_mode: "service:hermes"
    read_only: true
    security_opt:
      - no-new-privileges
    entrypoint: []
    command:
      - sh
      - -lc
      - |
        ip="$(hostname -i | awk '{print $1}')"
        exec socat "TCP-LISTEN:1455,bind=$${ip},fork,reuseaddr" TCP:127.0.0.1:1455
    depends_on:
      - hermes

  hermes-ingress:
    image: alpine/socat:latest@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e
    container_name: hermes-ingress
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges
    entrypoint: []
    command:
      - sh
      - -lc
      - |
        socat TCP-LISTEN:8642,fork,reuseaddr TCP:hermes:8642 &
        socat TCP-LISTEN:9119,fork,reuseaddr TCP:hermes:9119 &
        socat TCP-LISTEN:1455,fork,reuseaddr TCP:hermes:1455 &
        wait
    ports:
      - "127.0.0.1:${HERMES_API_PORT:-8642}:8642"
      - "127.0.0.1:${HERMES_DASHBOARD_PORT:-19119}:9119"
      - "127.0.0.1:${CODEX_LOGIN_CALLBACK_PORT:-1455}:1455"
    networks:
      - hermes-internal
      - internet
    depends_on:
      - hermes-dashboard-proxy
      - codex-login-proxy

networks:
  hermes-internal:
    internal: true
  internet:
